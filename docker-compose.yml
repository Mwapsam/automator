services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-automator}
      POSTGRES_USER: ${POSTGRES_USER:-automator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-automator_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI

  web:
    build: .
    command: sh /app/docker/entrypoint.sh
    restart: unless-stopped
    volumes:
      - .:/app
    expose:
      - "8000"          # no longer published to host directly; nginx fronts it
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - rabbitmq

  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web

  celery_worker:
    build: .
    # command: celery -A automator worker -l info -Q celery,email,whatsapp,outbound,bitrix
    command: celery -A automator worker -l info -Q celery,email,outbound
    restart: unless-stopped
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - rabbitmq

  celery_beat:
    build: .
    command: celery -A automator beat -l info
    restart: unless-stopped
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - rabbitmq

volumes:
  postgres_data: