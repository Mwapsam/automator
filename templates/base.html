<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Automator{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900">

  {% if user.is_authenticated %}
  <nav class="bg-white border-b border-gray-200">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-6">
        <a href="/dashboard/" class="font-semibold text-blue-600">Automator</a>
        <a href="/dashboard/" class="text-sm text-gray-600 hover:text-gray-900">Dashboard</a>
        <a href="/whatsapp/numbers/" class="text-sm text-gray-600 hover:text-gray-900">WhatsApp</a>
        <a href="/email/domains/" class="text-sm text-gray-600 hover:text-gray-900">Email</a>
        <a href="/billing/plans/" class="text-sm text-gray-600 hover:text-gray-900">Billing</a>
      </div>
      <form method="post" action="/auth/logout/">
        {% csrf_token %}
        <button class="text-sm text-gray-500 hover:text-gray-900">Sign out</button>
      </form>
    </div>
  </nav>
  {% endif %}

  <main class="max-w-5xl mx-auto px-4 py-8">
    {% if messages %}
      <div class="space-y-2 mb-6">
        {% for message in messages %}
          <div class="rounded-xl px-4 py-3 text-sm border
            {% if message.tags == 'error' %}bg-red-50 border-red-200 text-red-700
            {% elif message.tags == 'success' %}bg-green-50 border-green-200 text-green-700
            {% else %}bg-blue-50 border-blue-200 text-blue-700{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>

</body>
</html>
