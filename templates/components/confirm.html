{% comment %}Confirmation dialog — included once in base.html. Driven by $store.confirm.
AJAX forms with data-confirm trigger this; it resolves true/false.{% endcomment %}
<div x-data x-show="$store.confirm.open" x-cloak
     class="fixed inset-0 flex items-center justify-center p-4"
     style="z-index: var(--z-modal)"
     @keydown.escape.window="$store.confirm.respond(false)"
     role="dialog" aria-modal="true" aria-labelledby="confirm-title">
  <div class="absolute inset-0 bg-gray-900/40" @click="$store.confirm.respond(false)"></div>
  <div class="card shadow-modal w-full max-w-md p-6 relative"
       x-transition.scale.95.opacity x-trap.noscroll="$store.confirm.open">
    <h2 id="confirm-title" class="text-base font-semibold text-gray-900"
        x-text="$store.confirm.title || 'Are you sure?'"></h2>
    <p class="text-sm text-gray-500 mt-2" x-text="$store.confirm.message"></p>
    <div class="mt-6 flex justify-end gap-3">
      <button type="button" class="btn btn-secondary btn-sm"
              @click="$store.confirm.respond(false)">Cancel</button>
      <button type="button" class="btn btn-sm"
              :class="$store.confirm.danger ? 'btn-danger' : 'btn-primary'"
              x-text="$store.confirm.confirmLabel"
              @click="$store.confirm.respond(true)" x-init="$nextTick(() => {})"></button>
    </div>
  </div>
</div>
