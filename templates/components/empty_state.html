{% comment %}Empty state.
Usage: include components/empty_state.html with icon="globe" title="No domains yet" message="…"{% endcomment %}
<div class="text-center py-12 px-6">
  {% if icon %}
    <span class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-gray-100 text-gray-400">
      {% include "components/icon.html" with name=icon class="w-6 h-6" %}
    </span>
  {% endif %}
  <p class="mt-4 text-sm font-medium text-gray-900">{{ title }}</p>
  {% if message %}<p class="mt-1 text-sm text-gray-400 max-w-sm mx-auto">{{ message }}</p>{% endif %}
</div>
