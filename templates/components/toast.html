{# Toast region — included once in base.html. Driven by Alpine $store.toasts. #}
<div class="fixed top-4 right-4 w-[22rem] max-w-[calc(100vw-2rem)] space-y-2"
     style="z-index: var(--z-toast)"
     aria-live="polite" aria-atomic="true" x-data>
  <template x-for="t in $store.toasts.items" :key="t.id">
    <div x-transition.opacity.duration.200ms
         class="card card-pad !p-4 flex items-start gap-3 shadow-pop"
         :class="{
           'border-l-4 border-l-green-500': t.type === 'success',
           'border-l-4 border-l-red-500': t.type === 'danger',
           'border-l-4 border-l-amber-500': t.type === 'warning',
           'border-l-4 border-l-brand-500': t.type === 'info' || !t.type,
         }"
         role="status">
      <p class="flex-1 text-sm text-gray-700" x-text="t.message"></p>
      <button type="button" class="text-gray-400 hover:text-gray-600 shrink-0"
              @click="$store.toasts.remove(t.id)" aria-label="Dismiss">
        {% include "components/icon.html" with name="x" class="w-4 h-4" %}
      </button>
    </div>
  </template>
</div>
